services:
  # Backend Node.js Service
  - type: web
    name: pulse-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: pulse-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: pulse-backend
          property: host

databases:
  # Managed PostgreSQL Database
  - name: pulse-db
    databaseName: realtime_feedback
    user: pulse_user
