version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: pulse_postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulse_backend
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - db
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://user:password@db:5432/realtime_feedback

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulse_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
